name: Build C Project

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc sqlite3 libsqlite3-dev

      - name: Build project
        run: make

      - name: Run executable
        run: ./project/bin/green_app || true
